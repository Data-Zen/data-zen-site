<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page not found &middot; Data-Zen</title>
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#0a1320">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,400;0,9..144,500;1,9..144,400&family=Inter:opsz,wght@14..32,400;14..32,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--ink);
      color: var(--inv);
      text-align: center;
      padding: 56px 24px;
      position: relative;
      overflow: hidden;
    }
    .error-page::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(to right, rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 64px 64px;
      mask-image: radial-gradient(ellipse 60% 60% at 50% 50%, #000 30%, transparent 80%);
      -webkit-mask-image: radial-gradient(ellipse 60% 60% at 50% 50%, #000 30%, transparent 80%);
      pointer-events: none;
    }
    .error-inner { position: relative; z-index: 1; max-width: 480px; }
    .error-num {
      font-family: var(--serif);
      font-style: italic;
      font-size: clamp(7rem, 22vw, 13rem);
      font-weight: 400;
      line-height: 0.95;
      letter-spacing: -0.04em;
      color: var(--jade);
      margin-bottom: 24px;
    }
    .error-page h1 {
      font-family: var(--serif);
      font-weight: 400;
      font-size: clamp(1.7rem, 4vw, 2.4rem);
      letter-spacing: -0.022em;
      color: #fff;
      margin-bottom: 16px;
      line-height: 1.15;
    }
    .error-page p {
      color: var(--inv-mute);
      max-width: 380px;
      margin: 0 auto 36px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-inner">
      <div class="error-num">404</div>
      <h1>Page not found.</h1>
      <p>The page you are looking for does not exist or may have moved.</p>
      <a href="/" class="btn btn-primary">Back to home</a>
    </div>
  </div>
</body>
</html>
